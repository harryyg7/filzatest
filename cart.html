<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Filza · cart</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="offer-strip">✨ free shipping on orders above ₹499</div>
<header class="navbar">
  <a href="index.html" class="logo">filza.</a>
  <div class="search-container">
    <input type="text" placeholder="Search..." id="search-input">
    <button id="search-btn"><i class="fas fa-search"></i></button>
  </div>
  <ul class="nav-links">
    <li><a href="products.html">shop</a></li>
    <li class="dropdown"><a href="#">categories <i class="fas fa-chevron-down"></i></a>
      <div class="dropdown-menu">
        <a href="products.html?cat=sunscreen">sunscreen</a>
        <a href="products.html?cat=oils">oils & serums</a>
        <a href="products.html?cat=gels">gels & moisturizers</a>
        <a href="products.html?cat=cleansers">cleansers</a>
      </div>
    </li>
    <li><a href="products.html?cat=new">new</a></li>
    <li><a href="blogs.html">blogs</a></li>
    <li><a href="wishlist.html"><i class="far fa-heart"></i></a></li>
    <li><a href="cart.html"><i class="fas fa-shopping-bag"></i> <span class="cart-count" id="cart-count">0</span></a></li>
  </ul>
</header>

<main class="container cart-page">
  <h1 class="section-title">your cart</h1>
  <div id="cart-items"></div>
  <div class="cart-total" id="cart-total"></div>
  <div class="cart-actions">
    <a href="products.html" class="btn-outline-rose">continue shopping</a>
    <button class="btn-rose" onclick="checkout()">proceed to checkout</button>
  </div>
</main>

<footer class="footer">
  <div class="footer-content container">...</div>
  <div class="footer-bottom">© 2026 filza skincare. all rights reserved.</div>
</footer>

<script src="data/products.js"></script>
<script src="script.js"></script>
<script>
  function renderCartPage() {
    const cart = JSON.parse(localStorage.getItem('filzaCart')) || [];
    const container = document.getElementById('cart-items');
    const totalEl = document.getElementById('cart-total');
    if (!container) return;
    if (cart.length === 0) {
      container.innerHTML = '<p style="text-align:center; margin:40px;">your cart is empty 🛒</p>';
      totalEl.textContent = '';
      return;
    }
    let html = '';
    let total = 0;
    cart.forEach(item => {
      total += item.price * item.quantity;
      html += `
        <div class="cart-item">
          <img src="${item.img}" alt="${item.name}">
          <div class="cart-item-info">
            <h4>${item.name}</h4>
            <div class="cart-item-price">₹${item.price}</div>
          </div>
          <div class="cart-qty">
            <input type="number" value="${item.quantity}" min="1" onchange="updateCartQty(${item.id}, this.value)">
            <button class="cart-remove" onclick="removeFromCart(${item.id})"><i class="fas fa-trash-alt"></i></button>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
    totalEl.textContent = `Total: ₹${total}`;
  }

  function updateCartQty(id, newQty) {
    newQty = parseInt(newQty);
    if (newQty <= 0) {
      removeFromCart(id);
    } else {
      let cart = JSON.parse(localStorage.getItem('filzaCart')) || [];
      const item = cart.find(i => i.id === id);
      if (item) {
        item.quantity = newQty;
        localStorage.setItem('filzaCart', JSON.stringify(cart));
        updateCartCount();
        renderCartPage();
      }
    }
  }

  function removeFromCart(id) {
    let cart = JSON.parse(localStorage.getItem('filzaCart')) || [];
    cart = cart.filter(i => i.id !== id);
    localStorage.setItem('filzaCart', JSON.stringify(cart));
    updateCartCount();
    renderCartPage();
  }

  function checkout() {
    alert('Thank you for shopping! This is a demo.');
  }

  renderCartPage();

  // expose functions for onclick
  window.updateCartQty = updateCartQty;
  window.removeFromCart = removeFromCart;
  window.checkout = checkout;
</script>
</body>
</html>
