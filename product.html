<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Filza · product details</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .product-detail {
      display: flex;
      gap: 40px;
      margin: 50px 0;
      flex-wrap: wrap;
    }
    .product-images {
      flex: 1 1 300px;
    }
    .product-images img {
      width: 100%;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(200,109,120,0.15);
    }
    .product-info {
      flex: 1 1 400px;
    }
    .product-info h1 {
      font-size: 2.2rem;
      color: var(--rose-dark);
      margin-bottom: 10px;
    }
    .product-info .price {
      font-size: 1.8rem;
      color: var(--rose);
      font-weight: 600;
      margin: 20px 0;
    }
    .product-info .description {
      color: #5f4f4f;
      line-height: 1.6;
      margin: 20px 0;
    }
    .product-info .details {
      background: var(--rose-soft);
      padding: 20px;
      border-radius: 16px;
      margin: 20px 0;
    }
    .quantity-selector {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 30px 0;
    }
    .quantity-selector input {
      width: 60px;
      padding: 8px;
      border: 1px solid var(--rose-light);
      border-radius: 8px;
      text-align: center;
    }
    .btn-large {
      padding: 12px 40px;
      font-size: 1.1rem;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--rose);
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="offer-strip">✨ free shipping on orders above ₹499</div>
<header class="navbar">
  <a href="index.html" class="logo">filza.</a>
  <div class="search-container">
    <input type="text" placeholder="Search..." id="search-input">
    <button id="search-btn"><i class="fas fa-search"></i></button>
  </div>
  <ul class="nav-links">
    <li><a href="products.html">shop</a></li>
    <li class="dropdown"><a href="#">categories <i class="fas fa-chevron-down"></i></a>
      <div class="dropdown-menu">
        <a href="products.html?cat=sunscreen">sunscreen</a>
        <a href="products.html?cat=oils">oils & serums</a>
        <a href="products.html?cat=gels">gels & moisturizers</a>
        <a href="products.html?cat=cleansers">cleansers</a>
      </div>
    </li>
    <li><a href="products.html?cat=new">new</a></li>
    <li><a href="blogs.html">blogs</a></li>
    <li><a href="wishlist.html"><i class="far fa-heart"></i></a></li>
    <li><a href="cart.html"><i class="fas fa-shopping-bag"></i> <span class="cart-count" id="cart-count">0</span></a></li>
  </ul>
</header>

<main class="container" id="product-detail-container">
  <a href="javascript:history.back()" class="back-link"><i class="fas fa-arrow-left"></i> back to shop</a>
  <div class="product-detail" id="product-detail"></div>
</main>

<footer class="footer">
  <!-- same footer -->
  <div class="footer-content container">...</div>
  <div class="footer-bottom">© 2026 filza skincare. all rights reserved.</div>
</footer>

<script src="data/products.js"></script>
<script src="script.js"></script>
<script>
  // Get product ID from URL
  const urlParams = new URLSearchParams(window.location.search);
  const productId = parseInt(urlParams.get('id'));
  const product = products.find(p => p.id === productId);

  const container = document.getElementById('product-detail');
  if (!product) {
    container.innerHTML = '<p style="text-align:center; margin:40px;">Product not found.</p>';
  } else {
    container.innerHTML = `
      <div class="product-images">
        <img src="${product.img}" alt="${product.name}">
      </div>
      <div class="product-info">
        <h1>${product.name}</h1>
        <div class="price">₹${product.price}</div>
        <p class="description">${product.description}</p>
        <div class="details">
          <strong>details</strong><br>
          ${product.details}
        </div>
        <div class="quantity-selector">
          <label for="qty">Quantity:</label>
          <input type="number" id="qty" value="1" min="1">
        </div>
        <button class="btn-rose btn-large" onclick="addToCartWithQty(${product.id})">add to cart</button>
        <button class="btn-outline-rose btn-large" onclick="addToWishlist(${product.id})">❤️ wishlist</button>
      </div>
    `;
  }

  function addToCartWithQty(id) {
    const qty = parseInt(document.getElementById('qty').value) || 1;
    const product = products.find(p => p.id === id);
    if (!product) return;
    let cart = JSON.parse(localStorage.getItem('filzaCart')) || [];
    const existing = cart.find(item => item.id === id);
    if (existing) {
      existing.quantity += qty;
    } else {
      cart.push({ id, name: product.name, price: product.price, img: product.img, quantity: qty });
    }
    localStorage.setItem('filzaCart', JSON.stringify(cart));
    updateCartCount(); // from script.js
    alert(`Added ${qty} × ${product.name} to cart`);
  }

  function addToWishlist(id) {
    alert('Added to wishlist (demo)');
  }

  // Expose functions globally
  window.addToCartWithQty = addToCartWithQty;
  window.addToWishlist = addToWishlist;
</script>
</body>
</html>
